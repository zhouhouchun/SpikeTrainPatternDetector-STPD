key_schema:
- path: detector.min_valid_isi_sec
  input_id: detector__min_valid_isi_sec
  group: detector
  type: numeric
  default: '0.0009'
  label: 伪迹 / 最小有效 ISI（s）
  choices: ''
  min: '0'
  max: '0.01'
  step: '0.0001'
  scientific_note: 无效 ISI 的硬性伪迹阈值。
- path: detector.refractory_suspect_sec
  input_id: detector__refractory_suspect_sec
  group: detector
  type: numeric
  default: '0.0010'
  label: 疑似不应期 ISI 阈值（s）
  choices: ''
  min: '0'
  max: '0.01'
  step: '0.0001'
  scientific_note: 软性疑似不应期阈值；对单单位数据可疑，但不会自动视为伪迹。
- path: detector.refractory_suspect_action
  input_id: detector__refractory_suspect_action
  group: detector
  type: choice
  default: demote_to_possible
  label: 疑似不应期处理策略
  choices: warn_only|demote_to_possible|split_at_suspect|exclude_suspect_isi_and_reevaluate|exclude_candidate|mark_multiunit_contamination
  min: ''
  max: ''
  step: ''
  scientific_note: 包含疑似不应期 ISI 的 burst 候选处理策略。
- path: detector.patterns_to_run
  input_id: detector__patterns_to_run
  group: detector
  type: choice_vector
  default: burst,long_burst,tonic,high_frequency_tonic,high_frequency_spiking,pause,others
  label: 需要运行的检测器家族
  choices: burst|long_burst|tonic|high_frequency_tonic|high_frequency_spiking|pause|others
  min: ''
  max: ''
  step: ''
  scientific_note: long_burst 是 burst-family 亚型，因此会触发 burst-family 检测器。
- path: burst.local_compression_local_ratio_min
  input_id: burst__local_compression_local_ratio_min
  group: burst
  type: numeric
  default: '2.20'
  label: 局部压缩 local/core 比值最小值
  choices: ''
  min: '1'
  max: '10'
  step: '0.05'
  scientific_note: 局部压缩 burst-like 候选的局部中位/core 比值。
- path: burst.local_compression_candidate_class
  input_id: burst__local_compression_candidate_class
  group: burst
  type: choice
  default: possible_burst
  label: 局部压缩候选类别
  choices: possible_burst|burst
  min: ''
  max: ''
  step: ''
  scientific_note: 除非完成校准，默认局部压缩候选应保持为可复核。
- path: burst.final_tonic_like_action
  input_id: burst__final_tonic_like_action
  group: burst
  type: choice
  default: demote_to_possible
  label: Tonic-like burst 处理策略
  choices: annotate_only|demote_to_possible|reject|off
  min: ''
  max: ''
  step: ''
  scientific_note: 默认应将 tonic-like burst 候选降级，以避免稳定高频 epoch 被误判为高置信 burst。
- path: burst.long_burst_enable
  input_id: burst__long_burst_enable
  group: burst
  type: logical
  default: 'TRUE'
  label: 启用 long_burst 结构亚型
  choices: ''
  min: ''
  max: ''
  step: ''
  scientific_note: 结构性 long-burst 候选类别；需要生物学复核。
- path: burst.long_burst_min_spikes
  input_id: burst__long_burst_min_spikes
  group: burst
  type: integer
  default: '11'
  label: Long burst 最小 spike 数
  choices: ''
  min: '3'
  max: '100'
  step: '1'
  scientific_note: 事件型 long_burst 亚型的最小 spike 数。
- path: burst.long_burst_max_spikes
  input_id: burst__long_burst_max_spikes
  group: burst
  type: integer
  default: '15'
  label: Long burst 最大 spike 数
  choices: ''
  min: '3'
  max: '500'
